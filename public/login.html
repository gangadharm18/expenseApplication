<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/bootstrap.css">
    <link rel="stylesheet" href="/signup.css">

</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col d-flex flex-column align-items-center">
                <div class="content-box">
                    <h3 class="mb-3">Sign-in Form</h3>
                    <form action="" onsubmit="handleFormSignup(event)"
                        class="d-flex flex-column align-items-center mb-3">
                        <label for="" class="form-label border-primary">UserName:</label>
                        <input type="text" class="form-control" name="userName" required>

                        <label for="" class="form-label">Password:</label>
                        <input type="text" class="form-control" name="password" required>
                        <div class=" justify-content-center align-items-center mt-3">


                            <button class="btn  bg-success" type="submit">Login</button>

                        </div>


                    </form>
                    <label>Dont have account <a href="/signup.html" class="">Sign-Up</a> Here</label>

                </div>


            </div>

        </div>
    </div>



    <script src="/bootstrap.js"></script>
    <script src="/signup.js"></script>
</body>

</html>
